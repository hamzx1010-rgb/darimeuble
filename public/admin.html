<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF7;--white:#FFF;--text:#1A1A1A;--text-sec:#6B6B6B;--gold:#B8956A;--gold-light:#D4C5A9;--walnut:#5C4033;--charcoal:#2D2D2D;--cream:#F5F0E8;--border:#E8E4DE;--danger:#D4534B;--success:#5CB85C;--shadow:0 2px 12px rgba(0,0,0,.06);--r:8px;--r-lg:12px;--fh:'Playfair Display',Georgia,serif;--fb:'Inter',-apple-system,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--fb);border:none;background:none}
input,select,textarea{font-family:var(--fb)}

/* LOGIN */
.login-w{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--cream),var(--bg))}
.login-c{background:var(--white);border-radius:var(--r-lg);padding:48px 40px;max-width:400px;width:100%;box-shadow:var(--shadow);border:1px solid var(--border)}
.login-logo{font-family:var(--fh);font-size:32px;font-weight:700;text-align:center;margin-bottom:8px;color:var(--charcoal)}
.login-logo span{color:var(--gold)}
.login-sub{text-align:center;font-size:13px;color:var(--text-sec);margin-bottom:32px}
.fg{margin-bottom:20px}
.fg label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sec);margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--bg);transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,149,106,.15)}
.fg textarea{resize:vertical;min-height:60px}
.login-btn{width:100%;padding:14px;background:var(--charcoal);color:#fff;font-size:14px;font-weight:600;border-radius:var(--r);transition:.2s}
.login-btn:hover{background:#444}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none}

/* DASHBOARD */
.dash{display:none}
.dash-hd{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.dash-logo{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--charcoal)}
.dash-logo span{color:var(--gold)}
.dash-out{font-size:13px;color:var(--danger);cursor:pointer;font-weight:600}
.dash-body{max-width:1200px;margin:0 auto;padding:32px}
.dash-tabs{display:flex;gap:4px;margin-bottom:32px;border-bottom:2px solid var(--border);padding-bottom:0}
.dash-tab{padding:12px 24px;font-size:14px;font-weight:600;color:var(--text-sec);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;cursor:pointer}
.dash-tab:hover{color:var(--text)}
.dash-tab.on{color:var(--charcoal);border-bottom-color:var(--gold)}
.dash-panel{display:none}.dash-panel.on{display:block}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat{background:var(--white);border-radius:var(--r-lg);padding:24px;border:1px solid var(--border)}
.stat-l{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sec);margin-bottom:4px}
.stat-v{font-family:var(--fh);font-size:28px;font-weight:700;color:var(--charcoal)}

/* TABLES */
.s-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.s-title{font-family:var(--fh);font-size:20px;font-weight:600}
.add-btn{padding:10px 24px;background:var(--gold);color:#fff;font-size:13px;font-weight:600;border-radius:50px;transition:.2s}
.add-btn:hover{background:#a5804f}

table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border)}
th{background:var(--cream);padding:12px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;text-align:left;color:var(--text-sec)}
td{padding:12px 14px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(184,149,106,.04)}
.p-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--cream)}
.acts{display:flex;gap:8px}
.ab{padding:6px 14px;font-size:12px;font-weight:600;border-radius:6px;transition:.2s}
.ab-e{background:var(--cream);color:var(--walnut)}.ab-e:hover{background:var(--gold-light)}
.ab-d{background:#fde8e8;color:var(--danger)}.ab-d:hover{background:#f9d0d0}

/* FORM MODAL */
.fm-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.fm-bg.show{display:flex}
.fm{background:var(--white);border-radius:var(--r-lg);max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;animation:sUp .3s ease}
@keyframes sUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.fm h3{font-family:var(--fh);font-size:22px;margin-bottom:24px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fm-acts{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.btn-s{padding:12px 32px;background:var(--charcoal);color:#fff;font-size:14px;font-weight:600;border-radius:var(--r);transition:.2s}
.btn-s:hover{background:#444}
.btn-c{padding:12px 24px;background:var(--bg);color:var(--text-sec);font-size:14px;font-weight:600;border-radius:var(--r);border:1px solid var(--border);transition:.2s}
.btn-c:hover{background:var(--cream)}

/* UPLOAD */
.up-zone{border:2px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;margin-bottom:12px;cursor:pointer;transition:.2s}
.up-zone:hover{border-color:var(--gold-light);background:rgba(184,149,106,.04)}
.up-zone input{display:none}
.up-icon{font-size:28px;color:var(--gold);margin-bottom:8px}
.up-text{font-size:13px;color:var(--text-sec)}
.up-prevs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.up-prev{width:72px;height:72px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border)}
.up-prev img{width:100%;height:100%;object-fit:cover}
.up-prev .rm-img{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* COLOR INPUTS */
.clr-inputs{display:flex;flex-direction:column;gap:8px}
.clr-row{display:flex;gap:8px;align-items:center}
.clr-row input[type="color"]{width:36px;height:36px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer}
.clr-row input[type="text"]{flex:1}
.add-clr{font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;margin-top:4px}
.add-clr:hover{text-decoration:underline}

/* TOAST */
.a-toast{position:fixed;top:20px;right:20px;z-index:200;padding:14px 20px;border-radius:var(--r);font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateX(120%);transition:transform .35s ease}
.a-toast.show{transform:translateX(0)}
.a-toast.ok{background:#2e7d32;color:#fff}
.a-toast.err{background:var(--danger);color:#fff}

/* HEALTH */
.health-g{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.health-c{background:var(--white);border-radius:var(--r-lg);padding:20px;border:1px solid var(--border)}
.health-l{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sec);margin-bottom:4px}
.health-v{font-size:16px;font-weight:600;color:var(--charcoal)}

.empty{text-align:center;padding:60px 20px;color:var(--text-sec);font-size:15px}

@media(max-width:768px){
  .stats{grid-template-columns:1fr}.fg-row{grid-template-columns:1fr}
  .dash-body{padding:20px 16px}th,td{padding:8px;font-size:11px}
  .health-g{grid-template-columns:1fr}.fm{padding:20px;margin:10px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-w" id="loginW">
  <div class="login-c">
    <div class="login-logo">DARI<span>.</span></div>
    <div class="login-sub">Panneau de gestion</div>
    <div class="fg">
      <label>Mot de passe</label>
      <input type="password" id="loginPw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Accéder</button>
    <div class="login-err" id="loginErr">Mot de passe incorrect</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="dash-hd">
    <div class="dash-logo">DARI<span>.</span> <span style="font-family:var(--fb);font-size:13px;color:var(--text-sec);font-weight:400">Gestion</span></div>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:13px;color:var(--text-sec)" id="dashSt"></span>
      <span class="dash-out" onclick="doLogout()">Déconnexion</span>
    </div>
  </div>
  <div class="dash-body">
    <div class="dash-tabs">
      <div class="dash-tab on" onclick="swTab('overview',this)">Vue d'ensemble</div>
      <div class="dash-tab" onclick="swTab('products',this)">Produits</div>
      <div class="dash-tab" onclick="swTab('orders',this)">Commandes</div>
      <div class="dash-tab" onclick="swTab('health',this)">Santé</div>
    </div>
    <div class="dash-panel on" id="p-overview">
      <div class="stats" id="statsR"></div>
      <div class="s-bar"><div class="s-title">Dernières commandes</div></div>
      <div id="recentO"></div>
    </div>
    <div class="dash-panel" id="p-products">
      <div class="s-bar"><div class="s-title">Tous les produits</div><button class="add-btn" onclick="openPF()">+ Ajouter</button></div>
      <div id="prodList"></div>
    </div>
    <div class="dash-panel" id="p-orders">
      <div class="s-bar"><div class="s-title">Toutes les commandes</div></div>
      <div id="ordList"></div>
    </div>
    <div class="dash-panel" id="p-health">
      <div class="s-bar"><div class="s-title">État du système</div></div>
      <div class="health-g" id="healthG"></div>
    </div>
  </div>
</div>

<!-- PRODUCT FORM -->
<div class="fm-bg" id="pfModal">
  <div class="fm">
    <h3 id="pfTitle">Ajouter un produit</h3>
    <input type="hidden" id="editId">
    <div class="fg-row">
      <div class="fg"><label>Nom *</label><input type="text" id="pName" placeholder="Canapé Oslo"></div>
      <div class="fg"><label>Catégorie *</label><select id="pCat"><option value="salon">Salon</option><option value="chambre">Chambre</option><option value="salle-a-manger">Salle à manger</option><option value="bureau">Bureau</option></select></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Prix (DA) *</label><input type="number" id="pPrice" placeholder="125000"></div>
      <div class="fg"><label>Mis en avant</label><select id="pFeat"><option value="false">Non</option><option value="true">Oui — Populaire</option></select></div>
    </div>
    <div class="fg"><label>Description</label><textarea id="pDesc" placeholder="Description du produit..."></textarea></div>
    <div class="fg-row">
      <div class="fg"><label>Matière</label><input type="text" id="pMat" placeholder="Bois de noyer, tissu velours"></div>
      <div class="fg"><label>Dimensions</label><input type="text" id="pDim" placeholder="240 × 95 × 85 cm"></div>
    </div>
    <div class="fg"><label>Couleurs</label>
      <div class="clr-inputs" id="clrIn"><div class="clr-row"><input type="color" value="#D4C5A9"><input type="text" placeholder="Nom (ex: Beige)"></div></div>
      <div class="add-clr" onclick="addClrRow()">+ Couleur</div>
    </div>
    <div class="fg"><label>Image principale (URL)</label><input type="text" id="pImg" placeholder="https://..."></div>
    <div class="up-zone" onclick="document.getElementById('imgUp').click()">
      <input type="file" id="imgUp" accept="image/*" multiple onchange="handleUp(this.files)">
      <div class="up-icon">📁</div>
      <div class="up-text">Cliquez pour uploader (max 10, 5MB chacune)</div>
    </div>
    <div class="up-prevs" id="upPrevs"></div>
    <div class="fm-acts">
      <button class="btn-c" onclick="closePF()">Annuler</button>
      <button class="btn-s" onclick="saveProd()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="a-toast" id="aToast"></div>

<script>
const PW='hamza2025!';let authed=false,prods=[],ords=[],upImgs=[];

function doLogin(){
  if(document.getElementById('loginPw').value===PW){
    authed=true;document.getElementById('loginW').style.display='none';document.getElementById('dash').style.display='block';loadAll();
  }else{document.getElementById('loginErr').style.display='block';document.getElementById('loginPw').value=''}
}
function doLogout(){authed=false;document.getElementById('dash').style.display='none';document.getElementById('loginW').style.display='flex';document.getElementById('loginPw').value='';document.getElementById('loginErr').style.display='none'}

function swTab(tab,el){
  document.querySelectorAll('.dash-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.dash-panel').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');document.getElementById('p-'+tab).classList.add('on');
}

async function loadAll(){await Promise.all([loadProds(),loadOrds(),loadHlth()]);renderStats();renderRecent()}

async function loadProds(){
  try{const r=await fetch('/api/admin/products?auth='+PW);prods=await r.json()}catch{prods=[]}
  renderProds();
}
async function loadOrds(){
  try{const r=await fetch('/api/admin/orders?auth='+PW);ords=await r.json()}catch{ords=[]}
  renderOrds();
}
async function loadHlth(){
  try{
    const r=await fetch('/api/health');const h=await r.json();
    document.getElementById('healthG').innerHTML=`
      <div class="health-c"><div class="health-l">Statut</div><div class="health-v" style="color:#2e7d32">✓ ${h.status}</div></div>
      <div class="health-c"><div class="health-l">Produits</div><div class="health-v">${h.products}</div></div>
      <div class="health-c"><div class="health-l">Commandes</div><div class="health-v">${h.orders}</div></div>
      <div class="health-c"><div class="health-l">DB</div><div class="health-v">${h.dbSizeKB} KB</div></div>
      <div class="health-c"><div class="health-l">Uptime</div><div class="health-v">${Math.floor(h.uptime/60)} min</div></div>
      <div class="health-c"><div class="health-l">Activité</div><div class="health-v">${new Date(h.timestamp).toLocaleString('fr-FR')}</div></div>`;
  }catch{}
  document.getElementById('dashSt').textContent='En ligne';
}

function renderStats(){
  const rev=ords.reduce((s,o)=>s+(o.price||0),0);
  document.getElementById('statsR').innerHTML=`
    <div class="stat"><div class="stat-l">Produits</div><div class="stat-v">${prods.length}</div></div>
    <div class="stat"><div class="stat-l">Commandes</div><div class="stat-v">${ords.length}</div></div>
    <div class="stat"><div class="stat-l">Revenu total</div><div class="stat-v">${new Intl.NumberFormat('fr-DZ').format(rev)} DA</div></div>`;
}

function renderRecent(){
  const r=ords.slice(-5).reverse();
  if(!r.length){document.getElementById('recentO').innerHTML='<div class="empty">Aucune commande</div>';return}
  document.getElementById('recentO').innerHTML=`<table><tr><th>Produit</th><th>Client</th><th>Prix</th><th>Date</th></tr>${r.map(o=>`<tr><td>${o.product}</td><td>${o.customer}</td><td>${new Intl.NumberFormat('fr-DZ').format(o.price)} DA</td><td>${new Date(o.date).toLocaleDateString('fr-FR')}</td></tr>`).join('')}</table>`;
}

function renderProds(){
  if(!prods.length){document.getElementById('prodList').innerHTML='<div class="empty">Aucun produit. Cliquez "+ Ajouter" pour commencer.</div>';return}
  document.getElementById('prodList').innerHTML=`<table><tr><th>Img</th><th>Nom</th><th>Cat.</th><th>Prix</th><th>Actions</th></tr>${prods.map(p=>{
    const img=(p.images&&p.images[0])||p.image||'';
    return`<tr><td>${img?`<img class="p-thumb" src="${img}" alt="">`:'—'}</td><td><strong>${p.name}</strong></td><td>${p.category}</td><td>${new Intl.NumberFormat('fr-DZ').format(p.price)} DA</td><td><div class="acts"><button class="ab ab-e" onclick="editProd('${p.id}')">Modifier</button><button class="ab ab-d" onclick="delProd('${p.id}')">Supprimer</button></div></td></tr>`}).join('')}</table>`;
}

function renderOrds(){
  if(!ords.length){document.getElementById('ordList').innerHTML='<div class="empty">Aucune commande</div>';return}
  const s=[...ords].reverse();
  document.getElementById('ordList').innerHTML=`<table><tr><th>Produit</th><th>Client</th><th>Tél</th><th>Wilaya</th><th>Couleur</th><th>Qté</th><th>Paiement</th><th>Prix</th><th>Date</th><th></th></tr>${s.map(o=>`<tr><td><strong>${o.product}</strong></td><td>${o.customer}</td><td>${o.phone||'—'}</td><td>${o.wilaya||'—'}</td><td>${o.colorName||'—'}</td><td>${o.qty||1}</td><td>${o.paymentMethod==='eccp'?'eCCP':o.paymentMethod==='baridimob'?'BaridiMob':'Livraison'}</td><td>${new Intl.NumberFormat('fr-DZ').format(o.price)} DA</td><td>${new Date(o.date).toLocaleDateString('fr-FR')}</td><td><button class="ab ab-d" onclick="delOrd('${o.id}')">✕</button></td></tr>`).join('')}</table>`;
}

function openPF(){
  document.getElementById('editId').value='';document.getElementById('pfTitle').textContent='Ajouter un produit';
  ['pName','pDesc','pMat','pDim','pImg'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pCat').value='salon';document.getElementById('pPrice').value='';document.getElementById('pFeat').value='false';
  document.getElementById('clrIn').innerHTML='<div class="clr-row"><input type="color" value="#D4C5A9"><input type="text" placeholder="Nom (ex: Beige)"></div>';
  upImgs=[];document.getElementById('upPrevs').innerHTML='';
  document.getElementById('pfModal').classList.add('show');
}

function editProd(id){
  const p=prods.find(x=>x.id===id);if(!p)return;
  document.getElementById('editId').value=p.id;document.getElementById('pfTitle').textContent='Modifier';
  document.getElementById('pName').value=p.name;document.getElementById('pCat').value=p.category;
  document.getElementById('pPrice').value=p.price;document.getElementById('pFeat').value=p.featured?'true':'false';
  document.getElementById('pDesc').value=p.description||'';document.getElementById('pMat').value=p.material||'';
  document.getElementById('pDim').value=p.dimensions||'';document.getElementById('pImg').value=p.image||'';
  const clrs=p.colors||[],cN=p.colorNames||[];
  document.getElementById('clrIn').innerHTML=clrs.length?clrs.map((c,i)=>`<div class="clr-row"><input type="color" value="${c}"><input type="text" value="${cN[i]||''}" placeholder="Nom"></div>`).join(''):'<div class="clr-row"><input type="color" value="#D4C5A9"><input type="text" placeholder="Nom"></div>';
  upImgs=p.images||[];renderUpPrevs();
  document.getElementById('pfModal').classList.add('show');
}

function closePF(){document.getElementById('pfModal').classList.remove('show')}

function addClrRow(){
  const r=document.createElement('div');r.className='clr-row';
  r.innerHTML='<input type="color" value="#8B7355"><input type="text" placeholder="Nom">';
  document.getElementById('clrIn').appendChild(r);
}

async function handleUp(files){
  if(!files.length)return;const fd=new FormData();
  for(let i=0;i<Math.min(files.length,10);i++)fd.append('images',files[i]);
  try{
    const r=await fetch('/api/admin/upload?auth='+PW,{method:'POST',body:fd});
    const d=await r.json();if(d.success&&d.urls){upImgs=[...upImgs,...d.urls];renderUpPrevs()}
  }catch{aToast('Erreur upload',false)}
}

function renderUpPrevs(){
  document.getElementById('upPrevs').innerHTML=upImgs.map((u,i)=>`<div class="up-prev"><img src="${u}" alt=""><div class="rm-img" onclick="rmUpImg(${i})">✕</div></div>`).join('');
}
function rmUpImg(i){upImgs.splice(i,1);renderUpPrevs()}

async function saveProd(){
  const id=document.getElementById('editId').value;
  const name=document.getElementById('pName').value.trim();
  const cat=document.getElementById('pCat').value;
  const price=Number(document.getElementById('pPrice').value);
  const feat=document.getElementById('pFeat').value==='true';
  const desc=document.getElementById('pDesc').value.trim();
  const mat=document.getElementById('pMat').value.trim();
  const dim=document.getElementById('pDim').value.trim();
  const imgU=document.getElementById('pImg').value.trim();
  if(!name||!cat||!price){aToast('Nom, catégorie et prix requis',false);return}
  const clrRows=document.querySelectorAll('#clrIn .clr-row');const clrs=[],cN=[];
  clrRows.forEach(r=>{clrs.push(r.querySelector('input[type="color"]').value);cN.push(r.querySelector('input[type="text"]').value.trim())});
  const image=upImgs[0]||imgU;const images=upImgs.length?upImgs:(imgU?[imgU]:[]);
  const payload={name,category:cat,price,description:desc,material:mat,dimensions:dim,colors:clrs,colorNames:cN,image,images,featured:feat};
  try{
    let r;
    if(id)r=await fetch('/api/admin/products/'+id+'?auth='+PW,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    else r=await fetch('/api/admin/products?auth='+PW,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();if(d.success){aToast(id?'Produit mis à jour':'Produit ajouté',true);closePF();loadProds();loadHlth();renderStats()}
    else aToast(d.error||'Erreur',false);
  }catch{aToast('Erreur de connexion',false)}
}

async function delProd(id){if(!confirm('Supprimer ce produit ?'))return;
  try{const r=await fetch('/api/admin/products/'+id+'?auth='+PW,{method:'DELETE'});const d=await r.json();if(d.success){aToast('Supprimé',true);loadProds();loadHlth();renderStats()}}catch{}}

async function delOrd(id){if(!confirm('Supprimer cette commande ?'))return;
  try{const r=await fetch('/api/admin/orders/'+id+'?auth='+PW,{method:'DELETE'});const d=await r.json();if(d.success){aToast('Supprimée',true);loadOrds();loadHlth();renderStats();renderRecent()}}catch{}}

function aToast(msg,ok){const t=document.getElementById('aToast');t.textContent=msg;t.className='a-toast '+(ok?'ok':'err')+' show';setTimeout(()=>t.classList.remove('show'),3000)}

document.getElementById('pfModal').addEventListener('click',e=>{if(e.target.id==='pfModal')closePF()});
</script>
