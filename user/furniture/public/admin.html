<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF7;
  --white: #FFFFFF;
  --text: #1A1A1A;
  --text-secondary: #6B6B6B;
  --gold: #B8956A;
  --gold-light: #D4C5A9;
  --walnut: #5C4033;
  --charcoal: #2D2D2D;
  --cream: #F5F0E8;
  --border: #E8E4DE;
  --danger: #D4534B;
  --success: #5CB85C;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 8px;
  --radius-lg: 12px;
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Inter', -apple-system, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font-body);border:none;background:none}
input,select,textarea{font-family:var(--font-body)}

/* ═══ LOGIN ═══ */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--cream) 0%,var(--bg) 100%)}
.login-card{background:var(--white);border-radius:var(--radius-lg);padding:48px 40px;max-width:400px;width:100%;box-shadow:var(--shadow);border:1px solid var(--border)}
.login-logo{font-family:var(--font-heading);font-size:32px;font-weight:700;text-align:center;margin-bottom:8px;color:var(--charcoal)}
.login-logo span{color:var(--gold)}
.login-sub{text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--bg);transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,149,106,.15)}
.login-btn{width:100%;padding:14px;background:var(--charcoal);color:#fff;font-size:14px;font-weight:600;border-radius:var(--radius);transition:.2s}
.login-btn:hover{background:#444}
.login-error{color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none}

/* ═══ DASHBOARD ═══ */
.dashboard{display:none}
.dash-header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.dash-logo{font-family:var(--font-heading);font-size:22px;font-weight:700;color:var(--charcoal)}
.dash-logo span{color:var(--gold)}
.dash-user{font-size:13px;color:var(--text-secondary)}
.dash-logout{font-size:13px;color:var(--danger);cursor:pointer;font-weight:600}

.dash-body{max-width:1200px;margin:0 auto;padding:32px}

.dash-tabs{display:flex;gap:4px;margin-bottom:32px;border-bottom:2px solid var(--border);padding-bottom:0}
.dash-tab{padding:12px 24px;font-size:14px;font-weight:600;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;cursor:pointer}
.dash-tab:hover{color:var(--text)}
.dash-tab.active{color:var(--charcoal);border-bottom-color:var(--gold)}

.dash-panel{display:none}
.dash-panel.active{display:block}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--white);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--border)}
.stat-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:4px}
.stat-value{font-family:var(--font-heading);font-size:28px;font-weight:700;color:var(--charcoal)}

/* ── Products Table ── */
.section-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-title{font-family:var(--font-heading);font-size:20px;font-weight:600}
.add-btn{padding:10px 24px;background:var(--gold);color:#fff;font-size:13px;font-weight:600;border-radius:50px;transition:.2s}
.add-btn:hover{background:#a5804f}

.products-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
.products-table th{background:var(--cream);padding:12px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;text-align:left;color:var(--text-secondary)}
.products-table td{padding:12px 16px;border-top:1px solid var(--border);font-size:14px;vertical-align:middle}
.products-table tr:hover td{background:rgba(184,149,106,.04)}
.prod-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;background:var(--bg-warm)}
.actions{display:flex;gap:8px}
.act-btn{padding:6px 14px;font-size:12px;font-weight:600;border-radius:6px;transition:.2s}
.act-edit{background:var(--cream);color:var(--walnut)}
.act-edit:hover{background:var(--gold-light)}
.act-del{background:#fde8e8;color:var(--danger)}
.act-del:hover{background:#f9d0d0}

/* ── Orders Table ── */
.orders-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
.orders-table th{background:var(--cream);padding:12px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;text-align:left;color:var(--text-secondary)}
.orders-table td{padding:12px 12px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
.orders-table tr:hover td{background:rgba(184,149,106,.04)}
.status-badge{display:inline-block;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600}
.status-new{background:#e8f5e9;color:#2e7d32}
.status-processing{background:#fff3e0;color:#e65100}
.status-done{background:var(--cream);color:var(--walnut)}

/* ── Product Form Modal ── */
.form-modal-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.form-modal-backdrop.show{display:flex}
.form-modal{background:var(--white);border-radius:var(--radius-lg);max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.form-modal h3{font-family:var(--font-heading);font-size:22px;margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group textarea{resize:vertical;min-height:60px}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.btn-save{padding:12px 32px;background:var(--charcoal);color:#fff;font-size:14px;font-weight:600;border-radius:var(--radius);transition:.2s}
.btn-save:hover{background:#444}
.btn-cancel{padding:12px 24px;background:var(--bg);color:var(--text-secondary);font-size:14px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border);transition:.2s}
.btn-cancel:hover{background:var(--cream)}

/* ── Image upload ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:12px;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--gold-light);background:rgba(184,149,106,.04)}
.upload-zone input{display:none}
.upload-icon{font-size:28px;color:var(--gold);margin-bottom:8px}
.upload-text{font-size:13px;color:var(--text-secondary)}
.upload-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.upload-preview{width:72px;height:72px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border)}
.upload-preview img{width:100%;height:100%;object-fit:cover}
.upload-preview .remove-img{position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ── Color inputs ── */
.color-inputs{display:flex;flex-direction:column;gap:8px}
.color-row{display:flex;gap:8px;align-items:center}
.color-row input[type="color"]{width:36px;height:36px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer}
.color-row input[type="text"]{flex:1}
.add-color-btn{font-size:13px;color:var(--gold);font-weight:600;cursor:pointer;margin-top:4px}
.add-color-btn:hover{text-decoration:underline}

/* ── Toast ── */
.admin-toast{position:fixed;top:20px;right:20px;z-index:200;padding:14px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateX(120%);transition:transform .35s ease}
.admin-toast.show{transform:translateX(0)}
.admin-toast.success{background:#2e7d32;color:#fff}
.admin-toast.error{background:var(--danger);color:#fff}

/* ── Health ── */
.health-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.health-card{background:var(--white);border-radius:var(--radius-lg);padding:20px;border:1px solid var(--border)}
.health-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:4px}
.health-value{font-size:16px;font-weight:600;color:var(--charcoal)}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:15px}

/* ── Responsive ── */
@media(max-width:768px){
  .stats-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .dash-body{padding:20px 16px}
  .products-table,.orders-table{font-size:12px}
  .products-table th,.products-table td,.orders-table th,.orders-table td{padding:8px}
  .health-grid{grid-template-columns:1fr}
  .form-modal{padding:20px;margin:10px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">DARI<span>.</span></div>
    <div class="login-sub">Panneau de gestion</div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')attemptLogin()">
    </div>
    <button class="login-btn" onclick="attemptLogin()">Accéder</button>
    <div class="login-error" id="loginError">Mot de passe incorrect</div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div class="dash-logo">DARI<span>.</span> <span style="font-family:var(--font-body);font-size:13px;color:var(--text-secondary);font-weight:400">Gestion</span></div>
    <div style="display:flex;align-items:center;gap:16px">
      <span class="dash-user" id="dashStatus"></span>
      <span class="dash-logout" onclick="logout()">Déconnexion</span>
    </div>
  </div>
  <div class="dash-body">
    <div class="dash-tabs">
      <div class="dash-tab active" onclick="switchTab('overview')">Vue d'ensemble</div>
      <div class="dash-tab" onclick="switchTab('products')">Produits</div>
      <div class="dash-tab" onclick="switchTab('orders')">Commandes</div>
      <div class="dash-tab" onclick="switchTab('health')">Santé</div>
    </div>

    <!-- Overview -->
    <div class="dash-panel active" id="panel-overview">
      <div class="stats-row" id="statsRow"></div>
      <div class="section-bar">
        <div class="section-title">Dernières commandes</div>
      </div>
      <div id="recentOrders"></div>
    </div>

    <!-- Products -->
    <div class="dash-panel" id="panel-products">
      <div class="section-bar">
        <div class="section-title">Tous les produits</div>
        <button class="add-btn" onclick="openProductForm()">+ Ajouter un produit</button>
      </div>
      <div id="productsList"></div>
    </div>

    <!-- Orders -->
    <div class="dash-panel" id="panel-orders">
      <div class="section-bar">
        <div class="section-title">Toutes les commandes</div>
      </div>
      <div id="ordersList"></div>
    </div>

    <!-- Health -->
    <div class="dash-panel" id="panel-health">
      <div class="section-bar">
        <div class="section-title">État du système</div>
      </div>
      <div class="health-grid" id="healthGrid"></div>
    </div>
  </div>
</div>

<!-- ═══ PRODUCT FORM MODAL ═══ -->
<div class="form-modal-backdrop" id="productFormModal">
  <div class="form-modal">
    <h3 id="formTitle">Ajouter un produit</h3>
    <input type="hidden" id="editProductId">
    <div class="form-row">
      <div class="form-group">
        <label>Nom *</label>
        <input type="text" id="pName" placeholder="Canapé Oslo">
      </div>
      <div class="form-group">
        <label>Catégorie *</label>
        <select id="pCategory">
          <option value="salon">Salon</option>
          <option value="chambre">Chambre</option>
          <option value="salle-a-manger">Salle à manger</option>
          <option value="bureau">Bureau</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prix (DA) *</label>
        <input type="number" id="pPrice" placeholder="125000">
      </div>
      <div class="form-group">
        <label>Mis en avant</label>
        <select id="pFeatured">
          <option value="false">Non</option>
          <option value="true">Oui — Populaire</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="pDesc" placeholder="Description du produit..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Matière</label>
        <input type="text" id="pMaterial" placeholder="Bois de noyer, tissu velours">
      </div>
      <div class="form-group">
        <label>Dimensions</label>
        <input type="text" id="pDimensions" placeholder="240 × 95 × 85 cm">
      </div>
    </div>

    <!-- Colors -->
    <div class="form-group">
      <label>Couleurs disponibles</label>
      <div class="color-inputs" id="colorInputs">
        <div class="color-row">
          <input type="color" value="#D4C5A9">
          <input type="text" placeholder="Nom (ex: Beige)">
        </div>
      </div>
      <div class="add-color-btn" onclick="addColorRow()">+ Ajouter une couleur</div>
    </div>

    <!-- Image URL -->
    <div class="form-group">
      <label>Image principale (URL)</label>
      <input type="text" id="pImage" placeholder="https://...">
    </div>

    <!-- Image Upload -->
    <div class="upload-zone" onclick="document.getElementById('imageUpload').click()">
      <input type="file" id="imageUpload" accept="image/*" multiple onchange="handleImageUpload(this.files)">
      <div class="upload-icon">📁</div>
      <div class="upload-text">Cliquez pour uploader des images (max 10, 5MB chacune)</div>
    </div>
    <div class="upload-previews" id="uploadPreviews"></div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeProductForm()">Annuler</button>
      <button class="btn-save" onclick="saveProduct()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="admin-toast" id="adminToast"></div>

<script>
// ══════════════════════════
//  DARI ADMIN
// ══════════════════════════

const ADMIN_PASSWORD = 'hamza2025!';
let authed = false;
let products = [];
let orders = [];
let uploadedImages = [];

// ── Auth ──
function attemptLogin() {
  const pw = document.getElementById('loginPassword').value;
  if (pw === ADMIN_PASSWORD) {
    authed = true;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPassword').value = '';
  }
}

function logout() {
  authed = false;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Load data ──
async function loadAll() {
  await Promise.all([loadProducts(), loadOrders(), loadHealth()]);
  renderStats();
  renderRecentOrders();
}

async function loadProducts() {
  try {
    const res = await fetch('/api/admin/products?auth=' + ADMIN_PASSWORD);
    products = await res.json();
  } catch { products = []; }
  renderProducts();
}

async function loadOrders() {
  try {
    const res = await fetch('/api/admin/orders?auth=' + ADMIN_PASSWORD);
    orders = await res.json();
  } catch { orders = []; }
  renderOrders();
}

async function loadHealth() {
  try {
    const res = await fetch('/api/health');
    const h = await res.json();
    document.getElementById('healthGrid').innerHTML = `
      <div class="health-card"><div class="health-label">Statut</div><div class="health-value" style="color:#2e7d32">✓ ${h.status}</div></div>
      <div class="health-card"><div class="health-label">Produits</div><div class="health-value">${h.products}</div></div>
      <div class="health-card"><div class="health-label">Commandes</div><div class="health-value">${h.orders}</div></div>
      <div class="health-card"><div class="health-label">Uptime</div><div class="health-value">${Math.floor(h.uptime/60)} min</div></div>
      <div class="health-card"><div class="health-label">Dernière activité</div><div class="health-value">${new Date(h.timestamp).toLocaleString('fr-FR')}</div></div>
    `;
  } catch {}
  document.getElementById('dashStatus').textContent = 'En ligne';
}

// ── Stats ──
function renderStats() {
  const totalRevenue = orders.reduce((s, o) => s + (o.price || 0), 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Produits</div><div class="stat-value">${products.length}</div></div>
    <div class="stat-card"><div class="stat-label">Commandes</div><div class="stat-value">${orders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Revenu total</div><div class="stat-value">${new Intl.NumberFormat('fr-DZ').format(totalRevenue)} DA</div></div>
  `;
}

// ── Recent orders ──
function renderRecentOrders() {
  const recent = orders.slice(-5).reverse();
  if (!recent.length) {
    document.getElementById('recentOrders').innerHTML = '<div class="empty-state">Aucune commande pour le moment</div>';
    return;
  }
  document.getElementById('recentOrders').innerHTML = `
    <table class="orders-table">
      <tr><th>Produit</th><th>Client</th><th>Prix</th><th>Date</th></tr>
      ${recent.map(o => `<tr>
        <td>${o.product}</td>
        <td>${o.customer}</td>
        <td>${new Intl.NumberFormat('fr-DZ').format(o.price)} DA</td>
        <td>${new Date(o.date).toLocaleDateString('fr-FR')}</td>
      </tr>`).join('')}
    </table>
  `;
}

// ── Render products ──
function renderProducts() {
  if (!products.length) {
    document.getElementById('productsList').innerHTML = '<div class="empty-state">Aucun produit. Cliquez sur "Ajouter un produit" pour commencer.</div>';
    return;
  }
  document.getElementById('productsList').innerHTML = `
    <table class="products-table">
      <tr><th>Image</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Actions</th></tr>
      ${products.map(p => {
        const img = (p.images && p.images[0]) || p.image || '';
        return `<tr>
          <td>${img ? `<img class="prod-thumb" src="${img}" alt="">` : '—'}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.category}</td>
          <td>${new Intl.NumberFormat('fr-DZ').format(p.price)} DA</td>
          <td><div class="actions">
            <button class="act-btn act-edit" onclick="editProduct('${p.id}')">Modifier</button>
            <button class="act-btn act-del" onclick="deleteProduct('${p.id}')">Supprimer</button>
          </div></td>
        </tr>`;
      }).join('')}
    </table>
  `;
}

// ── Render orders ──
function renderOrders() {
  if (!orders.length) {
    document.getElementById('ordersList').innerHTML = '<div class="empty-state">Aucune commande</div>';
    return;
  }
  const sorted = [...orders].reverse();
  document.getElementById('ordersList').innerHTML = `
    <table class="orders-table">
      <tr><th>Produit</th><th>Client</th><th>Tél</th><th>Wilaya</th><th>Couleur</th><th>Qté</th><th>Paiement</th><th>Prix</th><th>Date</th><th>Action</th></tr>
      ${sorted.map(o => `<tr>
        <td><strong>${o.product}</strong></td>
        <td>${o.customer}</td>
        <td>${o.phone || '—'}</td>
        <td>${o.wilaya || '—'}</td>
        <td>${o.colorName || '—'}</td>
        <td>${o.qty || 1}</td>
        <td>${o.paymentMethod === 'eccp' ? 'eCCP' : o.paymentMethod === 'baridimob' ? 'BaridiMob' : 'Livraison'}</td>
        <td>${new Intl.NumberFormat('fr-DZ').format(o.price)} DA</td>
        <td>${new Date(o.date).toLocaleDateString('fr-FR')}</td>
        <td><button class="act-btn act-del" onclick="deleteOrder('${o.id}')">✕</button></td>
      </tr>`).join('')}
    </table>
  `;
}

// ── Product form ──
function openProductForm(id) {
  document.getElementById('editProductId').value = '';
  document.getElementById('formTitle').textContent = 'Ajouter un produit';
  document.getElementById('pName').value = '';
  document.getElementById('pCategory').value = 'salon';
  document.getElementById('pPrice').value = '';
  document.getElementById('pFeatured').value = 'false';
  document.getElementById('pDesc').value = '';
  document.getElementById('pMaterial').value = '';
  document.getElementById('pDimensions').value = '';
  document.getElementById('pImage').value = '';
  document.getElementById('colorInputs').innerHTML = `
    <div class="color-row">
      <input type="color" value="#D4C5A9">
      <input type="text" placeholder="Nom (ex: Beige)">
    </div>
  `;
  uploadedImages = [];
  document.getElementById('uploadPreviews').innerHTML = '';
  document.getElementById('productFormModal').classList.add('show');
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('editProductId').value = p.id;
  document.getElementById('formTitle').textContent = 'Modifier le produit';
  document.getElementById('pName').value = p.name;
  document.getElementById('pCategory').value = p.category;
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pFeatured').value = p.featured ? 'true' : 'false';
  document.getElementById('pDesc').value = p.description || '';
  document.getElementById('pMaterial').value = p.material || '';
  document.getElementById('pDimensions').value = p.dimensions || '';
  document.getElementById('pImage').value = p.image || '';

  const colors = p.colors || [];
  const colorNames = p.colorNames || [];
  document.getElementById('colorInputs').innerHTML = colors.length ? colors.map((c, i) => `
    <div class="color-row">
      <input type="color" value="${c}">
      <input type="text" value="${colorNames[i] || ''}" placeholder="Nom">
    </div>
  `).join('') : `
    <div class="color-row">
      <input type="color" value="#D4C5A9">
      <input type="text" placeholder="Nom (ex: Beige)">
    </div>
  `;

  // Show existing images
  uploadedImages = p.images || [];
  document.getElementById('uploadPreviews').innerHTML = uploadedImages.map((url, i) => `
    <div class="upload-preview">
      <img src="${url}" alt="">
      <div class="remove-img" onclick="removeUploadedImage(${i})">✕</div>
    </div>
  `).join('');

  document.getElementById('productFormModal').classList.add('show');
}

function closeProductForm() {
  document.getElementById('productFormModal').classList.remove('show');
}

// ── Add color row ──
function addColorRow() {
  const container = document.getElementById('colorInputs');
  const row = document.createElement('div');
  row.className = 'color-row';
  row.innerHTML = `<input type="color" value="#8B7355"><input type="text" placeholder="Nom">`;
  container.appendChild(row);
}

// ── Image upload ──
async function handleImageUpload(files) {
  if (!files.length) return;
  const formData = new FormData();
  for (let i = 0; i < Math.min(files.length, 10); i++) {
    formData.append('images', files[i]);
  }
  try {
    const res = await fetch('/api/admin/upload?auth=' + ADMIN_PASSWORD, {
      method: 'POST', body: formData
    });
    const data = await res.json();
    if (data.success && data.urls) {
      uploadedImages = [...uploadedImages, ...data.urls];
      renderUploadPreviews();
    }
  } catch { showToast('Erreur upload', false); }
}

function renderUploadPreviews() {
  document.getElementById('uploadPreviews').innerHTML = uploadedImages.map((url, i) => `
    <div class="upload-preview">
      <img src="${url}" alt="">
      <div class="remove-img" onclick="removeUploadedImage(${i})">✕</div>
    </div>
  `).join('');
}

function removeUploadedImage(idx) {
  uploadedImages.splice(idx, 1);
  renderUploadPreviews();
}

// ── Save product ──
async function saveProduct() {
  const id = document.getElementById('editProductId').value;
  const name = document.getElementById('pName').value.trim();
  const category = document.getElementById('pCategory').value;
  const price = Number(document.getElementById('pPrice').value);
  const featured = document.getElementById('pFeatured').value === 'true';
  const description = document.getElementById('pDesc').value.trim();
  const material = document.getElementById('pMaterial').value.trim();
  const dimensions = document.getElementById('pDimensions').value.trim();
  const imageUrl = document.getElementById('pImage').value.trim();

  if (!name || !category || !price) {
    showToast('Nom, catégorie et prix requis', false);
    return;
  }

  // Gather colors
  const colorRows = document.querySelectorAll('#colorInputs .color-row');
  const colors = [];
  const colorNames = [];
  colorRows.forEach(row => {
    const c = row.querySelector('input[type="color"]').value;
    const n = row.querySelector('input[type="text"]').value.trim();
    colors.push(c);
    colorNames.push(n);
  });

  const image = uploadedImages[0] || imageUrl;
  const images = uploadedImages.length ? uploadedImages : (imageUrl ? [imageUrl] : []);

  const payload = { name, category, price, description, material, dimensions, colors, colorNames, image, images, featured };

  try {
    let res;
    if (id) {
      res = await fetch('/api/admin/products/' + id + '?auth=' + ADMIN_PASSWORD, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      res = await fetch('/api/admin/products?auth=' + ADMIN_PASSWORD, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }
    const data = await res.json();
    if (data.success) {
      showToast(id ? 'Produit mis à jour' : 'Produit ajouté', true);
      closeProductForm();
      loadProducts();
      loadHealth();
      renderStats();
    } else {
      showToast(data.error || 'Erreur', false);
    }
  } catch { showToast('Erreur de connexion', false); }
}

// ── Delete product ──
async function deleteProduct(id) {
  if (!confirm('Supprimer ce produit ?')) return;
  try {
    const res = await fetch('/api/admin/products/' + id + '?auth=' + ADMIN_PASSWORD, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast('Produit supprimé', true);
      loadProducts();
      loadHealth();
      renderStats();
    }
  } catch {}
}

// ── Delete order ──
async function deleteOrder(id) {
  if (!confirm('Supprimer cette commande ?')) return;
  try {
    const res = await fetch('/api/admin/orders/' + id + '?auth=' + ADMIN_PASSWORD, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      showToast('Commande supprimée', true);
      loadOrders();
      loadHealth();
      renderStats();
      renderRecentOrders();
    }
  } catch {}
}

// ── Toast ──
function showToast(msg, success) {
  const t = document.getElementById('adminToast');
  t.textContent = msg;
  t.className = 'admin-toast ' + (success ? 'success' : 'error') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Close modal on backdrop ──
document.getElementById('productFormModal').addEventListener('click', (e) => {
  if (e.target.id === 'productFormModal') closeProductForm();
});
</script>
